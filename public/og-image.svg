<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b14"/>
      <stop offset="50%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#0b0b14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.1" r="0.6">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.95" r="0.5">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Icon mark -->
  <g transform="translate(80 80)">
    <rect width="120" height="120" rx="26" fill="url(#accent)"/>
    <circle cx="60" cy="60" r="26" fill="none" stroke="white" stroke-width="5"/>
    <circle cx="60" cy="60" r="8" fill="white"/>
  </g>

  <text x="230" y="150" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="44" font-weight="500" fill="#a0a0b8">
    MCP Playground
  </text>

  <!-- Headline -->
  <text x="80" y="330" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="84" font-weight="600" fill="white">
    Model Context Protocol
  </text>
  <text x="80" y="430" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="84" font-weight="600" fill="url(#accent)">
    im Browser erkunden.
  </text>

  <!-- Feature pills -->
  <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="22" fill="#d0d0e0">
    <rect x="80" y="500" width="180" height="48" rx="24" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)"/>
    <text x="170" y="532" text-anchor="middle">Tools</text>

    <rect x="280" y="500" width="220" height="48" rx="24" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)"/>
    <text x="390" y="532" text-anchor="middle">Resources</text>

    <rect x="520" y="500" width="200" height="48" rx="24" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.4)"/>
    <text x="620" y="532" text-anchor="middle">OAuth 2.1</text>

    <rect x="740" y="500" width="240" height="48" rx="24" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.4)"/>
    <text x="860" y="532" text-anchor="middle">JSON-RPC Trace</text>
  </g>

  <!-- Footer URL -->
  <text x="80" y="600" font-family="ui-monospace, SFMono-Regular, monospace" font-size="20" fill="#707088">
    shroomlife.github.io/mcp-playground
  </text>
</svg>
